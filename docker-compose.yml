services:
  api1:
    image: joaovitorgirardiii/rinha-2026-rust:latest
    environment:
      PORT: "3000"
      INDEX_PATH: "/app/ivf_index.bin"
      NPROBE: "16"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "167MB"

  api2:
    image: joaovitorgirardiii/rinha-2026-rust:latest
    environment:
      PORT: "3000"
      INDEX_PATH: "/app/ivf_index.bin"
      NPROBE: "16"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "167MB"

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "16MB"

networks:
  rinha:
    driver: bridge
